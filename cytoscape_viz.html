<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ZaC – Zones &amp; Conduits (Purdue levels)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    header {
      padding: 10px 16px;
      background: #16213e;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      border-bottom: 1px solid #0f3460;
    }
    header h1 { font-size: 1.1rem; color: #e94560; }

    #legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
      font-size: 0.8rem;
    }
    #controls label { color: #aaa; }
    #layout-select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #e94560;
      padding: 3px 6px;
      border-radius: 4px;
    }
    #fit-btn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #cy { flex: 1; }

    #tooltip {
      position: fixed;
      display: none;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.78rem;
      max-width: 280px;
      pointer-events: none;
      z-index: 999;
      line-height: 1.6;
    }
    #tooltip b { color: #e94560; }
  </style>
</head>
<body>

<header>
  <h1>ZaC – Zones &amp; Conduits</h1>

  <div id="legend">
    <!-- populated by JS -->
  </div>

  <div id="controls">
    <label for="layout-select">Layout:</label>
    <select id="layout-select">
      <option value="cose">CoSE (force)</option>
      <option value="breadthfirst">Breadth-first</option>
      <option value="circle">Circle</option>
      <option value="grid">Grid</option>
      <option value="concentric" selected>Concentric</option>
    </select>
    <button id="fit-btn">Fit</button>
  </div>
</header>

<div id="cy"></div>
<div id="tooltip"></div>

<script>
// ── Purdue level colour palette ──────────────────────────────────────────────
const PURDUE_COLORS = {
  "0":       { color: "#b00020", label: "Level 0 – Field / Process" },
  "1":       { color: "#e65100", label: "Level 1 – Basic Control" },
  "2":       { color: "#f9a825", label: "Level 2 – Supervisory Control" },
  "2.5":     { color: "#aed581", label: "Level 2.5 – Industrial DMZ" },
  "3":       { color: "#26a69a", label: "Level 3 – Site Operations" },
  "3.5":     { color: "#29b6f6", label: "Level 3.5 – Site DMZ" },
  "4":       { color: "#5c6bc0", label: "Level 4 – Business Planning" },
  "5":       { color: "#ab47bc", label: "Level 5 – Enterprise / Remote" },
  "unknown": { color: "#78909c", label: "Unknown" },
};

function nodeColor(label) {
  const key = String(label).trim();
  return (PURDUE_COLORS[key] || PURDUE_COLORS["unknown"]).color;
}

// ── Build legend ─────────────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
for (const [key, { color, label }] of Object.entries(PURDUE_COLORS)) {
  legendEl.innerHTML +=
    `<div class="legend-item">
       <div class="legend-dot" style="background:${color}"></div>
       <span>${label}</span>
     </div>`;
}

// ── Fetch data & init Cytoscape ───────────────────────────────────────────────
fetch("/graph")
  .then(r => r.json())
  .then(data => {
    const cy = cytoscape({
      container: document.getElementById("cy"),
      elements: [...data.nodes, ...data.edges],
      style: [
        {
          selector: "node",
          style: {
            "background-color": ele => nodeColor(ele.data("label")),
            "label": "data(id)",
            "color": "#fff",
            "font-size": "9px",
            "text-valign": "center",
            "text-halign": "center",
            "width": 40,
            "height": 40,
            "border-width": 2,
            "border-color": "#fff",
            "text-wrap": "wrap",
            "text-max-width": "60px",
          }
        },
        {
          selector: "node:selected",
          style: {
            "border-color": "#e94560",
            "border-width": 3,
          }
        },
        {
          selector: "edge",
          style: {
            "width": 1.5,
            "line-color": "#607d8b",
            "target-arrow-color": "#607d8b",
            "target-arrow-shape": "triangle",
            "curve-style": "bezier",
            "opacity": 0.7,
          }
        },
        {
          selector: "edge:selected",
          style: {
            "line-color": "#e94560",
            "target-arrow-color": "#e94560",
            "opacity": 1,
            "width": 2.5,
          }
        },
        {
          selector: "edge.highlighted",
          style: {
            "line-color": "#ffeb3b",
            "target-arrow-color": "#ffeb3b",
            "opacity": 1,
            "width": 2,
          }
        },
      ],
      layout: {
        name: "concentric",
        concentric: n => {
          const lvl = parseFloat(n.data("label")) || 0;
          // higher Purdue level → outer ring
          return 10 - lvl * 2;
        },
        levelWidth: () => 1,
        padding: 30,
      },
      wheelSensitivity: 0.3,
    });

    // ── Tooltip on hover ──────────────────────────────────────────────────────
    const tooltip = document.getElementById("tooltip");

    cy.on("mouseover", "node", evt => {
      const d = evt.target.data();
      const lvlKey = String(d.label).trim();
      const lvlInfo = PURDUE_COLORS[lvlKey] || PURDUE_COLORS["unknown"];
      tooltip.innerHTML =
        `<b>${d.id}</b><br>
         Purdue level: ${d.label}<br>
         <span style="color:${lvlInfo.color}">${lvlInfo.label}</span>`;
      tooltip.style.display = "block";
    });

    cy.on("mouseover", "edge", evt => {
      const d = evt.target.data();
      tooltip.innerHTML =
        `<b>${d.edge_id}</b><br>
         ${d.source} → ${d.target}<br>
         ${d.description ? d.description + "<br>" : ""}
         Ports: ${d.ports || "—"}<br>
         Service: ${d.service || "—"}`;
      tooltip.style.display = "block";
    });

    cy.on("mouseout", "node, edge", () => {
      tooltip.style.display = "none";
    });

    cy.on("mousemove", evt => {
      tooltip.style.left = (evt.originalEvent.clientX + 14) + "px";
      tooltip.style.top  = (evt.originalEvent.clientY + 14) + "px";
    });

    // ── Highlight connected edges on node click ───────────────────────────────
    cy.on("tap", "node", evt => {
      cy.edges().removeClass("highlighted");
      evt.target.connectedEdges().addClass("highlighted");
    });
    cy.on("tap", evt => {
      if (evt.target === cy) cy.edges().removeClass("highlighted");
    });

    // ── Layout switcher ───────────────────────────────────────────────────────
    document.getElementById("layout-select").addEventListener("change", e => {
      const name = e.target.value;
      const opts = name === "concentric"
        ? {
            name,
            concentric: n => 10 - (parseFloat(n.data("label")) || 0) * 2,
            levelWidth: () => 1,
            padding: 30,
          }
        : { name, padding: 30 };
      cy.layout(opts).run();
    });

    document.getElementById("fit-btn").addEventListener("click", () => cy.fit());
  })
  .catch(err => {
    document.getElementById("cy").innerHTML =
      `<p style="color:#e94560;padding:20px">Failed to load graph data: ${err}</p>`;
  });
</script>
</body>
</html>
